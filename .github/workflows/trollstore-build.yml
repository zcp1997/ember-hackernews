name: Build for TrollStore

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-15 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_16.app

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build and Archive (Unsigned)
      run: |
        xcodebuild -project Ember.xcodeproj \
                   -scheme Ember \
                   -sdk iphoneos \
                   -configuration Release \
                   -archivePath $RUNNER_TEMP/Ember.xcarchive \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   COMPILER_INDEX_STORE_ENABLE=NO \
                   ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO \
                   archive

    - name: Create IPA Container
      run: |
        mkdir -p $RUNNER_TEMP/Payload
        cp -r $RUNNER_TEMP/Ember.xcarchive/Products/Applications/*.app $RUNNER_TEMP/Payload/
        cd $RUNNER_TEMP
        zip -r Ember-HackerNews.ipa Payload

    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ember-TrollStore
        path: ${{ runner.temp }}/Ember-HackerNews.ipa
