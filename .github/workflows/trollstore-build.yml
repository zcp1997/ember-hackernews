name: Build for TrollStore

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-15 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_16.app

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    # 🛠️ 暴力降维打击：修复命名冲突，并彻底清空资产目录，不给 actool 报错的机会
    - name: Fix Naming and Assets Bug
      run: |
        # 1. 修复代码命名冲突
        sed -i '' 's/\.buttonStyle(\.card)/\.buttonStyle(CardButtonStyle())/g' Sources/Features/StoryDetail/StoryDetailView.swift
        
        # 2. 彻底清空 Assets 内部文件，只留下目录本身，不让它编译任何图标/颜色
        rm -rf Resources/Assets.xcassets/*

    - name: Build and Archive (Unsigned)
      run: |
        xcodebuild -project Ember.xcodeproj \
                   -scheme Ember \
                   -sdk iphoneos \
                   -configuration Release \
                   -archivePath $RUNNER_TEMP/Ember.xcarchive \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGN_IDENTITY="" \
                   COMPILER_INDEX_STORE_ENABLE=NO \
                   archive

    - name: Create IPA Container
      run: |
        mkdir -p $RUNNER_TEMP/Payload
        cp -r $RUNNER_TEMP/Ember.xcarchive/Products/Applications/*.app $RUNNER_TEMP/Payload/
        cd $RUNNER_TEMP
        zip -r Ember-HackerNews.ipa Payload

    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ember-TrollStore
        path: ${{ runner.temp }}/Ember-HackerNews.ipa
