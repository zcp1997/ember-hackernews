name: Build for TrollStore

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-26

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Show Xcode Version
      run: |
        xcodebuild -version
        xcrun --sdk iphoneos --show-sdk-version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Ensure App Icon Exists
      run: |
        if [ ! -f Resources/Assets.xcassets/AppIcon.appiconset/icon-1024.png ]; then
          swift Tools/GenerateIcon.swift
        fi

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Fix SwiftUI Naming Conflict
      run: |
        sed -i '' 's/\.buttonStyle(\.card)/\.buttonStyle(CardButtonStyle())/g' Sources/Features/StoryDetail/StoryDetailView.swift

    - name: Build and Archive Unsigned
      run: |
        set -o pipefail
        xcodebuild -project Ember.xcodeproj \
          -scheme Ember \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -archivePath "$RUNNER_TEMP/Ember.xcarchive" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          COMPILER_INDEX_STORE_ENABLE=NO \
          archive | tee "$RUNNER_TEMP/xcodebuild.log"

    - name: Show Build Errors
      if: failure()
      run: |
        grep -nE "error:|fatal error:|ARCHIVE FAILED|BUILD FAILED|The following build commands failed" "$RUNNER_TEMP/xcodebuild.log" || true

    - name: Create IPA Container
      run: |
        mkdir -p "$RUNNER_TEMP/Payload"
        cp -R "$RUNNER_TEMP/Ember.xcarchive/Products/Applications/Ember.app" "$RUNNER_TEMP/Payload/"
        cd "$RUNNER_TEMP"
        zip -r Ember-HackerNews.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Ember-TrollStore
        path: ${{ runner.temp }}/Ember-HackerNews.ipa
